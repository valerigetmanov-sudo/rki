<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #f5576c;
            margin: 0;
        }
        p {
            color: #666;
            margin-top: 10px;
        }
        .red-box {
            width: 100px;
            height: 100px;
            background: #f5576c;
            margin: 20px auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    test
    <div class="container">
        <h1>Red Page</h1>
        <div class="red-box"></div>
        <p>This is your red themed page</p>
    </div>
</body>
</html>
